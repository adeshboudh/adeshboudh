<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15151E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E1E2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E10600;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF1801;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Red stripe accent -->
  <rect y="0" width="1200" height="6" fill="url(#stripe)"/>

  <!-- Diagonal pattern overlay simulating carbon fiber -->
  <pattern id="carbon" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="4" height="20" fill="rgba(255,255,255,0.03)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#carbon)"/>

  <!-- Content -->
  <g font-family="'Exo 2', Arial, sans-serif" fill="#FFFFFF">
    <!-- Name -->
    <text x="60" y="200" font-size="72" font-weight="800" letter-spacing="-2">ADESH BOUDH</text>

    <!-- Title -->
    <text x="60" y="270" font-size="32" font-weight="600" fill="#00D2BE" letter-spacing="4">AI / ML ENGINEER</text>

    <!-- Subtitle -->
    <text x="60" y="320" font-size="20" fill="#8C8C9B" letter-spacing="2">RAG PIPELINES · LLM SYSTEMS · SCALABLE AI BACKENDS</text>

    <!-- Stats bar -->
    <rect x="60" y="380" width="1080" height="2" fill="rgba(255,255,255,0.1)"/>

    <!-- Projects -->
    <text x="60" y="460" font-size="18" font-weight="700" fill="#E10600">PROJECTS</text>

    <!-- CivicSetu -->
    <text x="60" y="500" font-size="22" font-weight="600">CivicSetu — Open-Source Civic RAG System</text>
    <text x="60" y="530" font-size="16" fill="#8C8C9B">12/12 benchmarks passing · 5 legal domains · Live on Hugging Face</text>

    <!-- LLM Playground -->
    <text x="60" y="580" font-size="22" font-weight="600">LLM Playground — Pre-Training & Alignment from Scratch</text>
    <text x="60" y="610" font-size="16" fill="#8C8C9B">GPT-2 124M trained from scratch · Full RLHF pipeline · Free-tier compute</text>
  </g>

  <!-- Red accent dot -->
  <circle cx="1140" cy="580" r="8" fill="#E10600">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>